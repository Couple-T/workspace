# ─────────────────────────────────────────────────────────────────────────────
# workspace.config.yaml — the ONE file each organization fills in.
#
# Copy this to `workspace.config.yaml` and edit. It is the human-readable source of
# truth for the whole orchestration:
#   • skills + agents read it (and docs/agents/issue-tracker.md) at runtime;
#   • `scripts/aiworks sync` reads `products:` (the repo URLs) and sets EVERYTHING up —
#     generates mani.d/<product>.yaml, clones each repo, builds the codegraph index,
#     installs the skill packs, seeds hooks, scaffolds CLAUDE.md + scripts/dev.sh;
#   • the adapters read their slice from scripts/{vcs,tracker}/.env;
#   • the dev-cycle workflow keeps a mirrored CONFIG block at the top of
#     .claude/workflows/dev-cycle.js (Workflow scripts cannot read the filesystem at
#     runtime). `scripts/aiworks sync` — and every `add` / `remove` — REGENERATES that
#     block from THIS file automatically (`scripts/aiworks config` is the standalone step),
#     so the mirror always tracks this file. You never hand-edit dev-cycle.js.
#
# The fast path to onboard repos:  add their URLs under `products:` below, then run
#   scripts/aiworks sync          # clone + onboard every declared repo (idempotent)
# ─────────────────────────────────────────────────────────────────────────────

org:
  name: Couple-T                       # shown in agent copy / summaries
  product: "feeed-me"   # the domain agents ground research/copy in

# ── Version control ──────────────────────────────────────────────────────────
vcs:
  provider: github                 # github | gitlab  (auto-detected from the repo URL/origin if omitted)
  auto_merge: true                 # after review + the test-suite gate validate the candidate, the
                                   #   dev-cycle squash-merges the PR/MR automatically, then distributes
                                   #   the merged build. false → it still reviews + runs the test-suite gate,
                                   #   then STOPS and leaves the PR/MR OPEN for a human to merge (nothing is
                                   #   merged or distributed). Override for a single repo with repos[].auto_merge.

# ── Notifications ──────────────────────────────────────────────────────────────
# AFTER the run finishes its pre-merge work (every repo built + reviewed and the cross-repo
# test-suite gate green) the dev-cycle can post a "please review" digest to chat. This phase
# runs LAST (after Summary) and ONLY when BOTH hold:
#   • notify.enabled: true        (this block), AND
#   • vcs.auto_merge:  false      (auto-merge ON ⇒ the run merges + distributes itself, so there
#                                  is nothing left for a human to review — the notification is skipped).
# The message is the open PR/MR per repo for the ticket:
#     Please review, FM-12 Add the vet-visit reminder.
#     - feeedme-app: https://github.com/your-org/feeedme-app/pull/42
#     - feeedme-appium: https://github.com/your-org/feeedme-appium/pull/7
# Posting goes through the notify adapter (scripts/notify/), provider-agnostic like vcs/tracker.
notify:
  enabled: false                   # true → post the review-request when auto_merge is off (see above)
  provider: slack                  # slack (the only provider today)
  channel: "#feeed-me-reviews"     # the Slack channel the digest is posted to (id or #name). The token/
                                   #   webhook live in scripts/notify/.env (seeded by `aiworks sync`).

# ── Issue tracker ──────────────────────────────────────────────────────────────
tracker:
  provider: notion                 # notion | jira
  ticket_prefix: FM                # FM | OFB | …  → drives the ticket-id regex (e.g. FM-\d+)
  # Canonical workflow phase → the org's REAL status name (what the tracker shows / Jira
  # transitions to). Skills/agents/dev-cycle use these names when moving a ticket.
  # Declare WHATEVER your board uses — every key here is mirrored into the workflow. The
  # dev-cycle drives the ticket FORWARD ONLY, at aggregate milestones (it owns the status;
  # the per-repo agents don't), and at each milestone it uses the best status you've
  # declared: e.g. after review it prefers `ready_to_merge`, else `ready_to_test`. Extra
  # keys (e.g. `to_do`, `code_review`, `ready_to_merge`) are optional and fully supported.
  statuses:
    not_started:   "Not started"
    in_progress:   "In progress"
    # code_review:   "Code review"     # optional — richer boards can add intermediate states
    # ready_to_merge: "Ready to merge"
    ready_to_test: "Ready to test"
    testing:       "Testing"
    done:          "Done"

# ── Branch model (defaults; a repo may override under products[].repos[].base) ─
branch_model:
  feature_base: develop            # base branch for feature/* work
  fix_base:     main               # base branch for fix/* work

# ── Quality gate (the guardian's static-analysis gate) ─────────────────────────
quality_gate:
  provider: sonarqube              # sonarqube | none

review:
  level: thorough                    # strict | thorough  (default: strict)

# ── Planning (governs every planning step — e.g. the dev-cycle Kickoff) ────────
planning:
  auto_approve: true               # auto-approve-plan. true → execution proceeds straight from the
                                   #   plan (no review). false → after a plan is produced the run
                                   #   STOPS for a human to review + APPROVE before execution (build);
                                   #   re-run the dev-cycle with --approve-plan to proceed past the gate.
  to_html: false                   # plan-to-html. true → each plan is ALSO rendered to a self-contained
                                   #   interactive HTML doc (the write-interactive-docs skill), alongside
                                   #   the plan markdown — handy for sharing/reviewing when auto_approve is off.

# ── Design (governs ALL Figma usage across the workspace) ──────────────────────
# How the team works with Figma — see docs/agents/figma.md for the full convention.
design:
  enabled: true                   # MASTER Figma switch (default OFF). false → NO agent calls Figma:
                                   #   the /prd design phase is skipped (tickets carry build-ready specs,
                                   #   no frames) and the dev/QA agents build from the spec instead of a
                                   #   Figma screenshot. true → the design pipeline runs (planner → assets
                                   #   → designer) and needs a connected Figma MCP. Turn this ON to design.
  figma_file_key: "y63FiPwVieelbKp5DYzNDX"               # the org's ONE canonical design file — the key in
                                   #   figma.com/design/<KEY>/…. Set → every /prd run builds its screens
                                   #   as a NEW PAGE inside THIS file, reusing its variables/components
                                   #   (zero orphan files); tickets link node URLs within it. Empty → each
                                   #   run creates a NEW (orphan) file and the run WARNS how to configure
                                   #   this. Only consulted when enabled: true.
  # page_naming: "{work_key} / {feature}"   # page-name template inside the canonical file. Tokens:
                                   #   {work_key} (e.g. phase-2) and {feature}. The default gives one page
                                   #   per feature so parallel designers don't collide; use "{work_key}"
                                   #   for a single shared page per run.

# ── Image generation (the graphic-designer's asset pipeline; feeds the design phase) ──
# How Fiona (graphic-designer) makes assets via the mcp-image server — see
# docs/agents/image-generation.md for setup (the GEMINI_API_KEY lives in the git-ignored
# .claude/settings.local.json, never here).
image_generation:
  enabled: true                   # MASTER switch for mcp-image generation (default OFF). false →
                                   #   the graphic-designer generates NO images (returns every asset
                                   #   'unavailable'; the design phase stays specs/placeholder-only).
                                   #   true → real assets via mcp-image, which needs GEMINI_API_KEY.
                                   #   `aiworks sync` only wires up the mcp-image server when this is true.
  quality: balanced                # fast | balanced | quality → the mcp-image IMAGE_QUALITY preset
                                   #   (seeded into .claude/settings.local.json env by `aiworks sync`).
  max_per_request: 2               # budget cap: the MOST generations the graphic-designer fires per
                                   #   request (keeps Gemini spend bounded). Raise only when needed.

# ── Products & repos — THE PART EACH ORG CONFIGURES ────────────────────────────
# A product groups the repos that ship together. Each product is ONE
# mani.d/<id>.yaml file (GENERATED from this block by `aiworks` — don't hand-edit
# mani.d). For each repo you only need a `url` (+ `kind`); aiworks derives the rest:
#
#   id / path  ← the repo NAME from the URL (last path segment, minus .git).  Override
#                the clone dir with `path:`.
#   desc       → a one-line repo responsibility — what this repo IS and owns, so the team (and
#                the agents) can read the workspace's anatomy BEFORE anything is cloned. Optional
#                but recommended. Flows verbatim into the generated mani.d/<product>.yaml `desc:`
#                (what `mani list projects` shows). Omitted → defaults to "The <repo-name> repo.".
#                (`description:` is accepted as an alias.)
#   kind       → a FREE-FORM, tech-agnostic dev-context LABEL (frontend, backend, web-app,
#                service, migration, generic, …) — the tech goes in `lang`, NOT the kind.
#                It selects one of two role/gate ARCHETYPES:
#                  test-suite   → qa-runner builds the test suite (E2E / API / load), no code
#                                 review, provides the cross-repo test-suite (QA) gate. The ONE
#                                 special kind name.
#                  <any other>  → a code repo: developer builds (TDD), code-reviewer reviews,
#                                 guard+perf gates on (tune per repo via green / guardian_focus)
#
# After editing this block run `scripts/aiworks sync` to clone + onboard. That (like `add` /
# `remove`) also REGENERATES the dev-cycle.js CONFIG `REPOS` block from this file — the workflow
# can't read the FS at runtime, so `scripts/aiworks config` keeps its mirror in sync for you.
products:
  - id: feeed-me                          # → mani.d/<product-id>.yaml
    repos:
      - url: git@github.com:Couple-T/feeedme-app.git   # ← all you must provide
        kind: mobile                              # any dev-context label; test-suite = QA archetype
        desc: The mobile app for the feeed-me platform.   # one-line repo responsibility (anatomy at a glance)
        lang: dart                                  # the TECH lives here; else auto-detected from the clone
        app_id: com.feeedme.feeedme                     # mobile apps only — the app/bundle id the QA suite drives (matches config/capabilities.js)
        distribute: firebase                        # firebase | none | custom  (default: none)
        # auto_merge: false                         # optional — override vcs.auto_merge for this repo
        # path: your-app                            # optional — clone dir (default: the repo name)
        green: "flutter test"   # optional override (else from kind)
        guardian_focus: "secrets, data-protection, perms…"     # optional override (else from kind)

      - url: git@github.com:Couple-T/feeedme-appium.git
        kind: test-suite                            # the cross-repo QA suite (E2E / API / load)
        desc: Android/iOS E2E UI tests for the feeed-me app.      # one-line repo responsibility
        lang: javascript 
        green: "appium tests passed successfully"

# Repo dependency edges (build/merge order) are decided per-ticket by the scoping
# stage; a typical chain is backend → app → test-suite.
