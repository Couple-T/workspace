org:
  name: Couple-T
  product: "feeed-me"

vcs:
  provider: github
  auto_merge: true

notify:
  enabled: false
  provider: slack
  channel: "#feeed-me-reviews"

tracker:
  provider: linear
  ticket_prefix: FMA
  statuses:
    not_started: "Backlog"
    todo: "To Do"
    in_progress: "In Progress"
    code_review: "In Review"
    ready_to_test: "Ready To Test"
    testing: "Testing"
    done: "Done"

branch_model:
  feature_base: develop
  fix_base:     main

quality_gate:
  provider: none

review:
  level: thorough

planning:
  auto_approve: true
  to_html: false

design:
  enabled: true
  figma_file_key: "y63FiPwVieelbKp5DYzNDX"
image_generation:
  enabled: true
  quality: balanced
  max_per_request: 2

products:
  - id: feeed-me
    repos:
      - url: git@github.com:Couple-T/feeedme-app.git
        kind: mobile
        desc: The mobile app for the feeed-me platform.
        lang: dart
        app_id: com.feeedme.feeedme
        distribute: firebase
        green: "flutter test"
        guardian_focus: "secrets, data-protection, perms…"

      - url: git@github.com:Couple-T/feeedme-appium.git
        kind: test-suite
        desc: Android/iOS E2E UI tests for the feeed-me app.
        lang: javascript
        green: "appium tests passed successfully"