# Per-product project files are GENERATED into mani.d/ by `scripts/aiworks sync`
# (from workspace.config.yaml products[]), which also maintains this import list.
import:
  - mani.d/feeed-me.yaml

sync_gitignore: false

specs:
  custom:
    output: table
    parallel: true
    forks: 8

targets:
  all:
    all: true

themes:
  custom:
    table:
      border:
        around: true
        header: true
        columns: true
        rows: true
  
tasks:
  branchs:
    desc: show current branch for all repos
    spec: custom
    target: all
    cmd: git rev-parse --abbrev-ref HEAD

  status:
    desc: show working tree status
    spec: custom
    target: all
    cmd: git status

  develop:
    desc: checkout develop for all repos
    spec: custom
    target: all
    cmd: |
      if [[ -n $(git status --porcelain) ]]; then
        echo "⚠️ ⚠️ ⚠️  DIRTY WORKING TREE — SKIPPED CHECKOUT on $(git rev-parse --abbrev-ref HEAD)"
        echo "⚠️  commit or stash your changes, then re-run 'mani run checkout-develop'"
        exit 1
      fi
      git checkout develop

  pulls:
    desc: fetch and pull latest for all repos
    spec: custom
    target: all
    cmd: |
      git fetch --all --prune
      if [[ -n $(git status --porcelain) ]]; then
        echo "⚠️ ⚠️ ⚠️  DIRTY WORKING TREE — SKIPPED PULL on $(git rev-parse --abbrev-ref HEAD)"
        echo "⚠️  commit or stash your changes, then re-run 'mani run pulls'"
        exit 1
      fi
      git pull --rebase --stat
